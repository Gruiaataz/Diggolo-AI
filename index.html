<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>AI-Diggolo | Gruia-Alexandru</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 90%; max-width: 500px; height: 80vh; background: var(--card); border: 1px solid #30363d; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        header { padding: 15px; background: #21262d; border-bottom: 1px solid #30363d; text-align: center; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px; border-radius: 10px; max-width: 85%; line-height: 1.4; font-size: 15px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .user { background: #238636; color: white; align-self: flex-end; }
        .ai { background: #30363d; align-self: flex-start; border: 1px solid #444; }
        .input-area { display: flex; padding: 15px; background: #161b22; border-top: 1px solid #30363d; }
        input { flex: 1; padding: 12px; border: 1px solid #30363d; border-radius: 6px; background: #0d1117; color: white; outline: none; }
        button { margin-left: 10px; padding: 0 20px; background: var(--accent); border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        code { background: #000; color: #7ee787; padding: 2px 5px; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body>

<div class="chat-container">
    <header>
        <strong style="color: var(--accent); font-size: 1.2rem;">AI-Diggolo</strong><br>
        <small>Creat de Gruia-Alexandru</small>
    </header>
    <div id="chat-box">
        <div class="msg ai">Salut! Sunt AI-Diggolo. Sunt gata să te ajut cu scripturi Lua sau Python. Ce facem azi?</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Întreabă-mă ceva...">
        <button id="sendBtn">Trimite</button>
    </div>
</div>

<script>
    const box = document.getElementById('chat-box');
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');

    // Token-ul tău de Hugging Face (Gratuit)
    const HF_TOKEN = "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";
    // Model multilingv (Română + Cod)
    const MODEL = "Qwen/Qwen2.5-7B-Instruct"; 

    async function askAI() {
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        input.value = "";
        
        const loadingMsg = addMessage("AI-Diggolo scrie...", 'ai');

        try {
            const response = await fetch(`https://api-inference.huggingface.co/models/${MODEL}`, {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${HF_TOKEN}`, 
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({ 
                    inputs: `<|im_start|>system\nTu ești AI-Diggolo, un asistent creat de Gruia-Alexandru. Răspunzi mereu în română și ești expert în Lua și Python.<|im_end|>\n<|im_start|>user\n${text}<|im_end|>\n<|im_start|>assistant`,
                    parameters: { max_new_tokens: 500 }
                })
            });

            const data = await response.json();

            if (data.error) {
                // Dacă modelul se încarcă
                loadingMsg.innerText = "Serverul se trezește... Mai apasă o dată 'Trimite' în 15 secunde.";
            } else {
                let reply = data[0].generated_text;
                // Curățăm răspunsul să vedem doar ce a scris AI-ul
                const cleanReply = reply.split("<|im_start|>assistant").pop().replace("<|im_end|>", "").trim();
                loadingMsg.innerText = cleanReply;
            }
        } catch (e) {
            loadingMsg.innerText = "Ups! Ceva n-a mers. Verifică netul.";
        }
    }

    function addMessage(txt, cls) {
        const d = document.createElement('div');
        d.className = `msg ${cls}`;
        d.innerText = txt;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
        return d;
    }

    btn.onclick = askAI;
    input.onkeydown = (e) => { if(e.key === 'Enter') askAI(); };
</script>

</body>
</html>
