<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>AI-Diggolo | Gruia-Alexandru</title>
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat { width: 400px; height: 500px; background: #161b22; display: flex; flex-direction: column; border-radius: 10px; border: 1px solid #333; }
        #box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 8px; max-width: 80%; }
        .user { background: #238636; align-self: flex-end; }
        .ai { background: #21262d; align-self: flex-start; border: 1px solid #444; }
        .input-box { display: flex; padding: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 10px; border: none; border-radius: 5px; background: #0d1117; color: white; }
        button { margin-left: 10px; padding: 10px; background: #58a6ff; border: none; border-radius: 5px; cursor: pointer; color: white; }
    </style>
</head>
<body>
    <div class="chat">
        <header style="padding: 10px; text-align: center; border-bottom: 1px solid #333;">
            <strong>AI-Diggolo</strong> <br> <small>by Gruia-Alexandru</small>
        </header>
        <div id="box"></div>
        <div class="input-box">
            <input type="text" id="in" placeholder="Scrie un mesaj...">
            <button id="btn">Trimite</button>
        </div>
    </div>

    <script>
        const btn = document.getElementById('btn');
        const input = document.getElementById('in');
        const box = document.getElementById('box');

        // TOKEN-UL TĂU HUGGING FACE (Cel de tip READ)
        const TOKEN = "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";

        async function chat() {
            const txt = input.value.trim();
            if(!txt) return;

            addMsg(txt, 'user');
            input.value = "";
            
            const temp = addMsg("AI-Diggolo se gândește...", 'ai');

            try {
                const res = await fetch("https://api-inference.huggingface.co/models/facebook/blenderbot-400M-distill", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ inputs: txt })
                });

                const data = await res.json();

                if(data.error) {
                    temp.innerText = "Eroare: " + data.error;
                } else {
                    temp.innerText = data.generated_text || data[0].generated_text;
                }
            } catch (e) {
                temp.innerText = "Eroare de conexiune. Verifică internetul!";
            }
        }

        function addMsg(t, c) {
            const d = document.createElement('div');
            d.className = 'msg ' + c;
            d.innerText = t;
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
            return d;
        }

        btn.onclick = chat;
        input.onkeydown = (e) => { if(e.key === 'Enter') chat(); };
    </script>
</body>
</html>
