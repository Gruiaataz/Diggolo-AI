<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Gruia-Alexandru">
    <title>AI-Diggolo | By Gruia-Alexandru</title>
    <style>
        /* CSS-ul tău integrat */
        :root {
            --bg: #0b0e14;
            --card: #161b22;
            --accent: #58a6ff;
            --user: #238636;
            --text: #c9d1d9;
        }

        body {
            background: radial-gradient(circle at center, #1a1f2c 0%, var(--bg) 100%);
            font-family: 'Segoe UI', sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-container {
            width: 95%;
            max-width: 700px;
            height: 85vh;
            background: var(--card);
            border: 1px solid #30363d;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        header {
            padding: 15px 20px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 10px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .ai-message { background: #21262d; align-self: flex-start; border: 1px solid #30363d; }
        .user-message { background: var(--user); align-self: flex-end; color: white; }

        .code-block {
            background: #000;
            color: #7ee787;
            padding: 10px;
            font-family: monospace;
            display: block;
            margin-top: 10px;
            border-radius: 5px;
            white-space: pre-wrap;
        }

        .input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #30363d;
        }

        input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            padding: 12px;
            color: white;
            border-radius: 8px;
        }

        button {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <header>
        <h2 style="margin:0; color:var(--accent);">AI-Diggolo</h2>
        <span style="font-size: 12px;">Author: Gruia-Alexandru</span>
    </header>
    <div class="chat-box" id="chatBox">
        <div class="message ai-message">Salut! Sunt AI-Diggolo. Ce Doresti sa discutam?</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Scrie un mesaj..." onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Trimite</button>
    </div>
</div>

<script>
    // JS integrat direct
    const HF_TOKEN = "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";

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user-message');
        input.value = "";

        const loadingId = "load-" + Date.now();
        addMessage("Se gândește...", "ai-message", null, loadingId);

        try {
            // Folosim un model extrem de mic și rapid pentru a evita erorile de timeout
            const response = await fetch("https://api-inference.huggingface.co/models/facebook/blenderbot-400M-distill", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${HF_TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ inputs: text })
            });

            const data = await response.json();
            document.getElementById(loadingId).remove();

            if (data.error) {
                addMessage("Eroare de la server: Modelul se încarcă. Revino în 20 de secunde.", "ai-message");
            } else {
                const aiText = data.generated_text || data[0].generated_text;
                addMessage(aiText, "ai-message");
            }
        } catch (err) {
            document.getElementById(loadingId).remove();
            addMessage("Eroare: Verifică dacă ești conectat la internet.", "ai-message");
        }
    }

    function addMessage(text, className, code = null, id = null) {
        const chatBox = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = `message ${className}`;
        if(id) div.id = id;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        return div;
    }
</script>

</body>

</html>
